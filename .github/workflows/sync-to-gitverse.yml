name: Sync to GitVerse (Russia Mirror)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Sync to GitVerse
        run: |
          # Добавляем GitVerse как remote
          git remote add gitverse https://oauth2:${{ secrets.GITVERSE_TOKEN }}@gitverse.ru/USERNAME/globaldocs.pro.git
          
          # Пушим все ветки
          git push gitverse --all --force
          git push gitverse --tags --force
          
          # Удаляем remote (безопасность)
          git remote remove gitverse

# Инструкция по настройке:
# 1. Создай репозиторий на GitVerse: https://gitverse.ru
# 2. Получи токен доступа: Настройки → Токены → Создать токен
# 3. Добавь токен в GitHub Secrets:
#    - Зайди в репозиторий на GitHub
#    - Settings → Secrets and variables → Actions
#    - New repository secret → Name: GITVERSE_TOKEN
#    - Вставь токен из GitVerse
# 4. Замени USERNAME на свой логин в GitVerse
# 5. После пуша в GitHub — автоматически синхронизируется в GitVerse
