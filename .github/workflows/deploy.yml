name: 🚀 Auto Deploy HTML to FTP

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # FIX 1: Переключаемся на Node.js 24, чтобы убрать предупреждение
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 
    steps:
      - name: 🛒 Checkout code
        uses: actions/checkout@v4

      - name: 🚀 FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: domains/globaldocs.pro/public_html/
          exclude: |
            **/.git*
            **/.github*/**
            **/README.md
            **/.gitignore
            **/deploy.yml
