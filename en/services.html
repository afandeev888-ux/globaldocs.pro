  <style>
    /* Page Header */
    .page-header {
      padding: 100px 0 32px;
      background: var(--white);
      border-bottom: 1px solid var(--gray-200);
    }
    .page-header .breadcrumb {
      font-size: 0.85rem;
      color: var(--gray-400);
      margin-bottom: 16px;
    }
    .page-header .breadcrumb a {
      color: var(--gray-500);
      text-decoration: none;
    }
    .page-header .breadcrumb a:hover {
      color: var(--primary);
    }
    .page-header h1 {
      font-size: 2.25rem;
      font-weight: 800;
      color: var(--gray-900);
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    .page-header .page-desc {
      font-size: 1.05rem;
      color: var(--gray-500);
      max-width: 560px;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    /* Compact CTA bar */
    .compact-cta {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .compact-cta .hero-cta-btn {
      height: 44px;
      padding: 0 28px;
      font-size: 0.92rem;
    }
    .compact-cta .cta-note {
      font-size: 0.85rem;
      color: var(--gray-400);
    }
    .compact-cta .cta-note i {
      color: #4ade80;
      font-size: 1rem;
      vertical-align: middle;
      margin-right: 4px;
    }

    /* Services sections */
    .services-section {
      padding: 56px 0;
    }
    .services-section:first-of-type {
      padding-top: 56px;
    }
    .services-section + .services-section {
      border-top: 1px solid var(--gray-100);
    }

    .category-label {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--primary);
      margin-bottom: 8px;
    }
    .category-label.green { color: #059669; }
    .category-label.orange { color: #d97706; }

    .section-title {
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--gray-900);
      margin-bottom: 32px;
    }

    /* Service cards grid */
    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .service-link-card {
      display: flex;
      flex-direction: column;
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: 14px;
      padding: 24px 22px;
      text-decoration: none;
      color: inherit;
      transition: all 0.2s ease;
    }
    .service-link-card:hover {
      border-color: var(--blue-200);
      box-shadow: 0 6px 24px rgba(0,0,0,0.06);
      transform: translateY(-2px);
    }
    .service-link-card:focus-visible {
      outline: 3px solid rgba(26, 86, 219, 0.35);
      outline-offset: 2px;
    }
    .service-link-card .card-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      margin-bottom: 14px;
      background: #eff6ff;
      color: var(--blue-600);
    }
    .service-link-card .card-icon.green { background: #ecfdf5; color: #059669; }
    .service-link-card .card-icon.orange { background: #fffbeb; color: #d97706; }
    .service-link-card .card-icon.purple { background: #f5f3ff; color: #7c3aed; }
    .service-link-card .card-icon.red { background: #fef2f2; color: #dc2626; }
    .service-link-card h3 {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--gray-900);
      margin-bottom: 6px;
    }
    .service-link-card .card-desc {
      font-size: 0.88rem;
      color: var(--gray-500);
      line-height: 1.55;
      flex-grow: 1;
    }
    .service-link-card .card-arrow {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--blue-600);
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 12px;
    }
    .service-link-card:hover .card-arrow {
      gap: 9px;
    }

    /* Bottom note */
    .bottom-note {
      text-align: center;
      padding: 48px 0 64px;
      color: var(--gray-400);
      font-size: 0.92rem;
    }
    .bottom-note a {
      color: var(--primary);
      font-weight: 600;
    }
    .bottom-note a:hover {
      text-decoration: underline;
    }

    @media (max-width: 768px) {
      .page-header {
        padding: 88px 0 24px;
      }
      .page-header h1 {
        font-size: 1.7rem;
      }
      .services-grid {
        grid-template-columns: 1fr;
      }
      .compact-cta .cta-note {
        display: none;
      }
    }
  </style>
</head>
