        {
            "@type": "Question",
            "name": "What is the difference between notarial and regular translation?",
            "acceptedAnswer": {
                "@type": "Answer",
                "text": "A regular translation is simply a linguistic conversion of the document text. A notarial (notary-certified) translation is a translation performed by a professional translator whose signature is then certified by a notary public. The notary confirms the translator's identity and qualifications, which gives the translation legal weight. Notarial translations are accepted by most authorities worldwide, including immigration offices, courts and universities."
            }
        },
        {
            "@type": "Question",
            "name": "What languages are available for notarial translation?",
            "acceptedAnswer": {
                "@type": "Answer",
                "text": "We provide notarial translations into more than 30 languages, including English, German, French, Spanish, Italian, Portuguese, Chinese, Arabic, Hebrew, Japanese, Korean, Polish, Czech, Finnish and many others. If you need a language not listed here, contact us — we work with accredited translators for rare languages as well."
            }
        },
        {
            "@type": "Question",
            "name": "Can a copy be translated instead of the original?",
            "acceptedAnswer": {
                "@type": "Answer",
                "text": "Yes. In many cases, the notarial translation is performed on a notarized copy of the original document rather than on the original itself. This means you can keep your original document safe. We can arrange for a notarized copy to be made and then have it translated with notarial certification."
            }
        },
        {
            "@type": "Question",
            "name": "How long does notarial translation take?",
            "acceptedAnswer": {
                "@type": "Answer",
                "text": "The turnaround time depends on the language pair, the volume and complexity of the document, and whether express processing is needed. Simple documents in common languages typically take 1-3 business days. Larger or more complex documents may take longer. We provide an individual timeline estimate after reviewing your request."
            }
        },
        {
            "@type": "Question",
            "name": "Is a notarially certified translation accepted abroad?",
            "acceptedAnswer": {
                "@type": "Answer",
                "text": "Notarially certified translations are accepted by the majority of authorities worldwide. However, some countries have specific requirements — for example, Germany requires translations by a sworn translator (Vereidigter Übersetzer), and Spain requires a traductor jurado. We know the requirements for each country and will recommend the correct type of certified translation for your destination."
            }
        },
        {
            "@type": "Question",
            "name": "What is a sworn translator?",
            "acceptedAnswer": {
                "@type": "Answer",
                "text": "A sworn translator (also called a certified or authorized translator) is a language professional who has been officially appointed and sworn in by a government authority or court. In Germany, this is a Vereidigter Übersetzer; in Spain, a traductor jurado; in France, a traducteur assermenté. A sworn translator's signature and stamp are recognized directly by authorities without additional notarial certification. Some countries accept only sworn translator translations and not notary-certified ones."
            }
        },
        {
            "@type": "Question",
            "name": "How much does notarial translation cost?",
            "acceptedAnswer": {
                "@type": "Answer",
                "text": "The cost depends on the language pair, the number of pages, the complexity of the document and the level of urgency. We provide a detailed price quote before starting any work. Contact us via WhatsApp or Telegram with a photo of your document for an exact quote. No hidden fees."
            }
        }
    ]
}

  <script>
    function setLanguage(lang) {
      try {
        localStorage.setItem('lang_choice', lang);
      } catch (e) {}
    }
    const burger = document.getElementById('burger');
    const navLinks = document.getElementById('navLinks');
    burger.addEventListener('click', () => {
      burger.classList.toggle('active');
      navLinks.classList.toggle('active');
    });
    navLinks.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        burger.classList.remove('active');
        navLinks.classList.remove('active');
      });
    });
    document.querySelectorAll('.faq-question').forEach(question => {
      question.addEventListener('click', function() {
        const item = this.parentElement;
        const answer = item.querySelector('.faq-answer');
        const isActive = item.classList.contains('active');
        document.querySelectorAll('.faq-item').forEach(i => {
          i.classList.remove('active');
          i.querySelector('.faq-answer').style.maxHeight = null;
        });
        if (!isActive) {
          item.classList.add('active');
          answer.style.maxHeight = answer.scrollHeight + 'px';
        }
      });
    });
  </script>
