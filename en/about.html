<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About Us — Global Docs Pro</title>
  <meta name="description" content="Global Docs Pro has been helping people obtain documents from Russia since 2015. Learn about our team, mission and values.">
  <meta property="og:title" content="About Us — Global Docs Pro">
  <meta property="og:description" content="Learn more about Global Docs Pro — your trusted company for document delivery from Russia to anywhere in the world.">
  <meta property="og:locale" content="en_US">
  <meta property="og:url" content="https://globaldocs.pro/en/about.html">

  <link rel="alternate" hreflang="en" href="https://globaldocs.pro/en/about.html">
  <link rel="alternate" hreflang="ru" href="https://globaldocs.pro/ru/about.html">
  <link rel="alternate" hreflang="de" href="https://globaldocs.pro/de/about.html">
  <link rel="alternate" hreflang="x-default" href="https://globaldocs.pro/en/about.html">
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="/css/fontawesome/all.min.css">
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <style>
    .about-page-hero {
      padding: 120px 0 80px;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
      color: var(--white);
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .about-page-hero::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: url('https://images.unsplash.com/photo-1497366216548-37526070297c?w=1920&q=80');
      background-size: cover;
      background-position: center;
      opacity: 0.12;
      filter: grayscale(50%);
    }
    .about-page-hero::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(circle at center, rgba(15,23,42,0) 0%, rgba(15,23,42,0.8) 100%);
    }
    .about-page-hero .container {
      position: relative;
      z-index: 2;
    }
    .about-page-hero .breadcrumb {
      font-size: 0.85rem;
      opacity: 0.7;
      margin-bottom: 20px;
    }
    .about-page-hero .breadcrumb a {
      color: var(--white);
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .about-page-hero .breadcrumb a:hover {
      opacity: 1;
    }
    .about-page-hero h1 {
      font-size: 3rem;
      font-weight: 800;
      line-height: 1.15;
      margin-bottom: 20px;
      letter-spacing: -1px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    }
    .about-page-hero p {
      font-size: 1.2rem;
      color: rgba(255,255,255,0.85);
      max-width: 650px;
      margin: 0 auto;
      line-height: 1.7;
    }
    .about-story {
      padding: 100px 0;
    }
    .about-story-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: center;
    }
    .about-story-text h2 {
      font-size: 2rem;
      font-weight: 700;
      color: var(--gray-900);
      margin-bottom: 24px;
      letter-spacing: -0.5px;
    }
    .about-story-text p {
      font-size: 1rem;
      color: var(--gray-600);
      line-height: 1.8;
      margin-bottom: 16px;
    }
    .about-story-visual {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      border-radius: var(--radius-xl);
      padding: 48px;
      color: var(--white);
      position: relative;
      overflow: hidden;
    }
    .about-story-visual::before {
      content: '';
      position: absolute;
      top: -50px;
      right: -50px;
      width: 200px;
      height: 200px;
      background: rgba(255,255,255,0.1);
      border-radius: 50%;
    }
    .about-story-visual .year {
      font-size: 4rem;
      font-weight: 800;
      margin-bottom: 8px;
      opacity: 0.9;
    }
    .about-story-visual .label {
      font-size: 1.1rem;
      opacity: 0.8;
      margin-bottom: 32px;
    }
    .about-story-visual .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      position: relative;
      z-index: 1;
    }
    .about-story-visual .stat-box {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: var(--radius-lg);
      padding: 20px;
      text-align: center;
    }
    .about-story-visual .stat-box .number {
      font-size: 1.75rem;
      font-weight: 800;
      display: block;
    }
    .about-story-visual .stat-box .desc {
      font-size: 0.85rem;
      opacity: 0.8;
      margin-top: 4px;
    }
    .values-section {
      padding: 100px 0;
      background: var(--gray-50);
    }
    .values-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      margin-top: 48px;
    }
    .value-card {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-xl);
      padding: 36px;
      transition: var(--transition);
      text-align: center;
    }
    .value-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-xl);
    }
    .value-card .icon {
      font-size: 2.5rem;
      margin-bottom: 20px;
    }
    .value-card h3 {
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--gray-900);
      margin-bottom: 12px;
    }
    .value-card p {
      font-size: 0.92rem;
      color: var(--gray-500);
      line-height: 1.7;
    }
    .team-section {
      padding: 100px 0;
    }
    .team-section h2 {
      font-size: 2rem;
      font-weight: 700;
      color: var(--gray-900);
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }
    .team-section > .container > p {
      font-size: 1.1rem;
      color: var(--gray-500);
      max-width: 600px;
      margin: 0 auto 48px;
    }
    .team-features {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      max-width: 800px;
      margin: 0 auto;
    }
    .team-feature {
      display: flex;
      gap: 16px;
      padding: 24px;
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-lg);
      transition: var(--transition);
    }
    .team-feature:hover {
      box-shadow: var(--shadow-md);
      border-color: var(--primary-light);
    }
    .team-feature .icon {
      width: 48px;
      height: 48px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--primary-light);
      border-radius: var(--radius-lg);
      font-size: 1.3rem;
    }
    .team-feature h3 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--gray-900);
      margin-bottom: 6px;
    }
    .team-feature p {
      font-size: 0.88rem;
      color: var(--gray-500);
      line-height: 1.6;
    }
    @media (max-width: 1024px) {
      .about-story-grid {
        grid-template-columns: 1fr;
        gap: 40px;
      }
      .values-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      .team-features {
        grid-template-columns: 1fr;
      }
    }
    @media (max-width: 768px) {
      .about-page-hero {
        padding: 120px 0 60px;
      }
      .about-page-hero h1 {
        font-size: 2rem;
      }
      .about-page-hero p {
        font-size: 1rem;
      }
      .about-story,
      .values-section,
      .team-section {
        padding: 60px 0;
      }
      .values-grid {
        grid-template-columns: 1fr;
      }
    }
    @media (max-width: 480px) {
      .about-page-hero h1 {
        font-size: 1.7rem;
      }
      .about-story-visual {
        padding: 32px;
      }
      .about-story-visual .year {
        font-size: 3rem;
      }
    }
  </style>

  <script>
    function setLanguage(lang) {
      try { localStorage.setItem('lang_choice', lang); } catch (e) {}
    }
    const burger = document.getElementById('burger');
    const navLinks = document.getElementById('navLinks');
    burger.addEventListener('click', () => { burger.classList.toggle('active'); navLinks.classList.toggle('active'); });
    navLinks.querySelectorAll('a').forEach(link => { link.addEventListener('click', () => { burger.classList.remove('active'); navLinks.classList.remove('active'); }); });
