            "name": "What is needed to legalize a document from Russia for Germany?",
            "acceptedAnswer": {
                "@type": "Answer",
                "text": "For most documents, three steps are sufficient: affixing an apostille by the competent Russian authority, translating the document into German by a sworn translator and delivery to Germany. If you do not have the original document, we can obtain a duplicate by power of attorney. Contact us for an exact list of steps for your document."

            }

        {
            "@type": "Question",

            }

        {
            "@type": "Question",
            "name": "Do I need consular legalization or is an apostille sufficient?",
            "acceptedAnswer": {
                "@type": "Answer",
                "text": "For most documents (ZAGS certificates, diplomas, police clearance certificates, court decisions), an apostille is sufficient, as Germany and Russia are both parties to the Hague Convention. Consular legalization through the embassy is not required. However, certain special documents may require a different procedure — ask us."
            }
        },
        {
            "@type": "Question",
            "name": "Must apostilled documents be translated by a sworn translator?",
            "acceptedAnswer": {
                "@type": "Answer",
                "text": "Yes, German authorities (Ausländerbehörde, Standesamt, Arbeitsagentur, etc.) require translations by a sworn translator (vereidigte/r Übersetzerin) recognized by a German court. A regular translation, even if accurate, will not be accepted. We work with sworn translators whose translations are accepted by authorities in all German federal states."
            }
        },
        {
            "@type": "Question",
            "name": "Do I need to travel to Russia in person to obtain documents?",
            "acceptedAnswer": {
                "@type": "Answer",
                "text": "In most cases, no. We can obtain documents by notarized power of attorney. If you are outside Russia, you can issue a power of attorney at the Russian embassy/consulate in your country or through a notary with subsequent apostille. We will advise you in detail on how to properly issue the power of attorney."
            }
        },
        {
            "@type": "Question",
            "name": "Do you help with the recognition of diplomas in Germany (Anerkennung)?",
            "acceptedAnswer": {
                "@type": "Answer",
                "text": "We prepare all required documents for the Anerkennungsverfahren — apostilled copies of diplomas and transcripts, certified translations into German and any additional documents required by your federal state authority. You submit the application directly to the responsible authority (usually IHK or Bezirksregierung)."
            }
        },
        {
            "@type": "Question",
            "name": "Which cities in Germany do you deliver documents to?",
            "acceptedAnswer": {
                "@type": "Answer",
                "text": "We deliver to every city in Germany via international courier services with full tracking and insurance. Berlin, Munich, Hamburg, Frankfurt, Cologne, Stuttgart, Düsseldorf, Leipzig, Dresden, Hanover and every other city — your documents arrive safely."
            }
        },
        {
            "@type": "Question",
            "name": "What if a document is laminated?",
            "acceptedAnswer": {
                "@type": "Answer",
                "text": "Laminated documents are not accepted for apostille. A duplicate must be requested from the issuing authority. We help with the application process and preparation of the power of attorney."
            }
        },
        {
            "@type": "Question",
            "name": "Can an apostille be refused?",
            "acceptedAnswer": {
                "@type": "Answer",
                "text": "Yes, a refusal is possible if: the document is damaged, laminated or has illegible stamps; the form is outdated (e.g. old 'green booklets' of birth certificates); the document contains corrections or alterations. In such cases, a duplicate is issued on the current form."
            }
        },
        {
            "@type": "Question",
            "name": "How do I check the requirements of a specific German authority?",
            "acceptedAnswer": {
                "@type": "Answer",
                "text": "Before starting legalization, we recommend clarifying the requirements of the receiving authority (Ausländerbehörde, Standesamt, etc.). We help you formulate the inquiry or show you where to find up-to-date information on the authority's website."
            }
        },

  <script>
    const burger = document.getElementById('burger');
    const navLinks = document.getElementById('navLinks');
    burger.addEventListener('click', () => {
      burger.classList.toggle('active');
      navLinks.classList.toggle('active');
    });
    navLinks.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        burger.classList.remove('active');
        navLinks.classList.remove('active');
      });
    });

    document.querySelectorAll('.faq-question').forEach(question => {
      question.addEventListener('click', function() {
        const item = this.parentElement;
        const answer = item.querySelector('.faq-answer');
        const isActive = item.classList.contains('active');
        document.querySelectorAll('.faq-item').forEach(i => {
          i.classList.remove('active');
          i.querySelector('.faq-answer').style.maxHeight = null;
        });
        if (!isActive) {
          item.classList.add('active');
          answer.style.maxHeight = answer.scrollHeight + 'px';
        }
      });
    });
  </script>
