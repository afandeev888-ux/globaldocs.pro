            "name": "Do I need an apostille for documents for Kazakhstan?",
            "acceptedAnswer": {
                "@type": "Answer",
                "text": "No, apostille is not required for Kazakhstan. Russia and Kazakhstan have a Legal Assistance Treaty, meaning official documents issued by government authorities of one country are accepted in the other without additional legalization. A notarized translation into Kazakh is sufficient."
            }

            "@type": "Question",

            "acceptedAnswer": {
                "@type": "Answer",
                "text": "No, apostille is not required for Armenia. Armenia is a member of the Eurasian Economic Union and has a bilateral legal assistance agreement with Russia. Russian official documents are accepted by Armenian authorities without apostille. Only translation into Armenian is required."
            }
        },
        {
            "@type": "Question",
            "name": "For which CIS countries is an apostille required?",
            "acceptedAnswer": {
                "@type": "Answer",
                "text": "Apostille is required for: Moldova (not an EAEU member), Turkmenistan (no legal assistance agreement), Georgia (withdrew from CIS). For Kazakhstan, Armenia, Kyrgyzstan, Tajikistan and Belarus, apostille is NOT required due to bilateral agreements. For Uzbekistan, it depends on the document type and purpose."
            }
        },
        {
            "@type": "Question",
            "name": "What documents are most commonly needed for CIS countries?",
            "acceptedAnswer": {
                "@type": "Answer",
                "text": "The most requested documents: birth certificates (for children, school enrollment), marriage certificates, police clearance certificates (for work, residence permits), diplomas and certificates (for work, study), medical certificates. For real estate and business: property extracts, incorporation documents."
            }
        },
        {
            "@type": "Question",
            "name": "Do you deliver documents to CIS countries?",
            "acceptedAnswer": {
                "@type": "Answer",
                "text": "Yes, we deliver documents to all CIS countries: Kazakhstan (Almaty, Astana), Armenia (Yerevan), Uzbekistan (Tashkent), Kyrgyzstan (Bishkek), Moldova (Chisinau), Turkmenistan (Ashgabat), Georgia (Tbilisi) and other cities. Delivery via international courier services takes 3-7 business days."
            }
        },
        {
            "@type": "Question",
            "name": "Do documents need to be translated for CIS countries?",
            "acceptedAnswer": {
                "@type": "Answer",
                "text": "Yes, in most cases translation into the official language of the destination country is required. For Kazakhstan — translation into Kazakh, for Armenia — into Armenian, for Uzbekistan — into Uzbek, for Moldova — into Romanian. Translation is certified by a notary or consulate. We work with translators for all CIS languages."
            }
        },
        {
            "@type": "Question",
            "name": "How much does document legalization for CIS countries cost?",
            "acceptedAnswer": {
                "@type": "Answer",
                "text": "Cost depends on the destination country, document type, apostille requirement and translation. For EAEU countries (Kazakhstan, Armenia, Kyrgyzstan) the cost is lower as no apostille is needed. We always provide the full cost upfront before starting work. Contact us for a free quote."
            }

  <script>
    const burger = document.getElementById('burger');
    const navLinks = document.getElementById('navLinks');
    burger.addEventListener('click', () => {
      burger.classList.toggle('active');
      navLinks.classList.toggle('active');
    });
    navLinks.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        burger.classList.remove('active');
        navLinks.classList.remove('active');
      });
    });

    document.querySelectorAll('.faq-question').forEach(question => {
      question.addEventListener('click', function() {
        const item = this.parentElement;
        const answer = item.querySelector('.faq-answer');
        const isActive = item.classList.contains('active');
        document.querySelectorAll('.faq-item').forEach(i => {
          i.classList.remove('active');
          i.querySelector('.faq-answer').style.maxHeight = null;
        });
        if (!isActive) {
          item.classList.add('active');
          answer.style.maxHeight = answer.scrollHeight + 'px';
        }
      });
    });
  </script>
