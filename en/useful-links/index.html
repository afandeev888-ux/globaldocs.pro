            "name": "What is the Hague Apostille Convention?",
            "acceptedAnswer": {
                "@type": "Answer",
                "text": "The Hague Convention of 5 October 1961 Abolishing the Requirement of Legalisation for Foreign Public Documents is an international treaty that simplifies the process of authenticating public documents for use abroad. Instead of a multi-step consular legalization, a single apostille certificate is sufficient for countries that are party to the convention."
            }
        },
        {
            "@type": "Question",
            "name": "Which countries accept apostille?",
            "acceptedAnswer": {
                "@type": "Answer",
                "text": "Over 120 countries are members of the 1961 Hague Apostille Convention, including USA, all EU countries, UK, Australia, Canada, Israel, Japan, Brazil, India and many others. For countries not party to the convention (such as some Middle Eastern and Asian countries), consular legalization through the embassy is required."
            }
        },
        {
            "@type": "Question",
            "name": "What is the difference between a notarized translation and a regular translation?",
            "acceptedAnswer": {
                "@type": "Answer",
                "text": "A notarized translation is certified by a Russian notary who confirms the translator's signature and identity. This gives the translation legal weight and it is accepted by government authorities, courts and consulates. A regular translation has no legal certification and is generally not accepted for official purposes."
            }
        }
