<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global Docs Pro</title>
  <meta name="description" content="Global Docs Pro language routing page.">
  <meta name="robots" content="noindex,follow">
  <meta property="og:title" content="Global Docs Pro — Language Selector">
  <meta property="og:description" content="Select your language for Global Docs Pro.">
  <meta property="og:locale" content="en_US">
  <meta property="og:url" content="https://globaldocs.pro/">
  <link rel="canonical" href="https://globaldocs.pro/">
  <link rel="alternate" hreflang="en" href="https://globaldocs.pro/en/">
  <link rel="alternate" hreflang="ru" href="https://globaldocs.pro/ru/">
  <link rel="alternate" hreflang="de" href="https://globaldocs.pro/de/">
  <link rel="alternate" hreflang="x-default" href="https://globaldocs.pro/">
  <meta name="yandex-verification" content="b30514d0fecb3c2a" />
  <!-- Google Analytics 4 — Consent Mode v2 (denied by default) -->
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag("consent","default",{
      "ad_storage":"denied",
      "analytics_storage":"denied",
      "ad_user_data":"denied",
      "ad_personalization":"denied"
    });
  </script>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-E5L2QE2D7M"></script>
  <script>
    gtag("js",new Date());
    gtag("config","G-E5L2QE2D7M");
  </script>
</head>
<body>
  <script>
    function resolveLangFromBrowser() {
      var lang = (navigator.language || navigator.userLanguage || "").toLowerCase().substring(0, 2);
      if (lang === "ru") return "ru";
      if (lang === "de") return "de";
      return "en";
    }

    function targetPathForLang(lang) {
      if (lang === "ru") return "/ru/";
      if (lang === "de") return "/de/";
      return "/en/";
    }

    function goToLang(lang) {
      try {
        localStorage.setItem("lang_choice", lang);
      } catch (e) {}
      window.location.replace(targetPathForLang(lang));
    }

    (function autoRedirect() {
      try {
        var stored = localStorage.getItem("lang_choice");
        var lang = stored || resolveLangFromBrowser();
        window.location.replace(targetPathForLang(lang));
      } catch (e) {
        var fallback = resolveLangFromBrowser();
        window.location.replace(targetPathForLang(fallback));
      }
    })();
  </script>

  <!-- Cookie Consent -->
  <div class="cookie-banner" id="cookieBanner">
    <div class="container">
      <p>We use analytics to improve this site. <a href="/en/privacy.html">Learn more</a></p>
      <button class="cookie-btn-accept" id="cookieAccept">OK</button>
    </div>
  </div>
  <script>
  (function(){
    if(localStorage.getItem("cookie_consent"))return;
    var b=document.getElementById("cookieBanner");if(b)b.classList.add("visible");
    document.getElementById("cookieAccept").onclick=function(){
      localStorage.setItem("cookie_consent","1");
      gtag("consent","update",{"analytics_storage":"granted"});
      b.classList.remove("visible");
    };
  })();
  </script>
</body>

</html>
