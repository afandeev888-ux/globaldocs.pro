<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | Global Docs Pro</title>
  <meta name="description" content="The page you are looking for does not exist.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/css/fontawesome/all.min.css">
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
      color: var(--white);
      text-align: center;
      padding: 40px 20px;
    }
    .error-content {
      max-width: 600px;
    }
    .error-code {
      font-size: 8rem;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #4ade80 0%, #22d3ee 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .error-title {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 16px;
    }
    .error-text {
      font-size: 1.1rem;
      color: rgba(255,255,255,0.8);
      margin-bottom: 32px;
      line-height: 1.7;
    }
    .error-buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .error-buttons .btn {
      padding: 14px 28px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 12px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s ease;
    }
    .btn-home {
      background: #fff;
      color: #1e3a8a;
    }
    .btn-home:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }
    .btn-contact {
      background: #25d366;
      color: #fff;
    }
    .btn-contact:hover {
      background: #20bd5a;
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }
    .lang-links {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid rgba(255,255,255,0.2);
    }
    .lang-links p {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.6);
      margin-bottom: 12px;
    }
    .lang-links a {
      color: rgba(255,255,255,0.8);
      text-decoration: underline;
      text-underline-offset: 3px;
      margin: 0 8px;
      transition: color 0.2s;
    }
    .lang-links a:hover {
      color: #fff;
    }
    @media (max-width: 768px) {
      .error-code {
        font-size: 5rem;
      }
      .error-title {
        font-size: 1.5rem;
      }
      .error-text {
        font-size: 1rem;
      }
      .error-buttons {
        flex-direction: column;
        align-items: center;
      }
      .error-buttons .btn {
        width: 100%;
        max-width: 280px;
        justify-content: center;
      }
    }
  </style>
  <script async src="https://cloud.umami.is/script.js" data-website-id="f4345f20-84a5-452d-ac31-51395f9e8fbd" data-domain="globaldocs.pro"></script>
</head>
<body>
  <div class="error-page">
    <div class="error-content">
      <div class="error-code">404</div>
      <h1 class="error-title">Page Not Found</h1>
      <p class="error-text">
        The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.
      </p>
      <div class="error-buttons">
        <a href="/" class="btn btn-home">
          <i class="fa-solid fa-house"></i> Go Home
        </a>
        <a href="https://wa.me/79518994988" target="_blank" class="btn btn-contact">
          <i class="fa-brands fa-whatsapp"></i> Contact Us
        </a>
      </div>
      <div class="lang-links">
        <p>Choose your language:</p>
        <a href="/ru/">Русский</a>
        <a href="/en/">English</a>
        <a href="/de/">Deutsch</a>
      </div>
    </div>
  </div>
</body>
</html>
